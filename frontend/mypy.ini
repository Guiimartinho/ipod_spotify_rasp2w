[mypy]
python_version = 3.9
# Lenient by design: this is a hobby codebase being incrementally typed. The hints
# document intent and catch obvious mistakes without demanding full strictness.
ignore_missing_imports = True
warn_unused_ignores = True
warn_redundant_casts = True
no_implicit_optional = True
# tkinter / PIL / spotipy / redis are imported lazily and untyped; don't require stubs.
check_untyped_defs = False

[mypy-tests.*]
ignore_errors = True
