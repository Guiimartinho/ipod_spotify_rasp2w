# Hardening drop-in for sPot's Redis (AUDIT S2).
#
# Install on the Pi:
#   sudo cp deploy/redis/spot-redis.conf /etc/redis/redis.conf.d/spot.conf
#   # (or append these lines to /etc/redis/redis.conf)
#   sudo systemctl restart redis-server
#
# sPot reads the password from the SPOT_REDIS_PASSWORD environment variable
# (see frontend/.env.example and config.py). Set the same value in both places.

# Only listen on loopback — never expose Redis to the LAN.
bind 127.0.0.1 -::1
protected-mode yes
port 6379

# Require a password. Replace with a long random secret (do NOT commit the real one):
#   openssl rand -base64 32
requirepass CHANGE_ME_TO_A_LONG_RANDOM_SECRET

# sPot's cache is rebuildable from Spotify, so persistence is optional. Keeping the
# default RDB snapshots is fine; disable with `save ""` if you prefer a pure cache.
