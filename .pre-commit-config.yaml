# Install once with:  pip install pre-commit && pre-commit install
# (and for the push gate:  pre-commit install --hook-type pre-push)
# Then these run automatically on `git commit`. Run on everything: pre-commit run -a
repos:
  # ruff = linter + import sorting (auto-fix). black = formatter. (No ruff-format,
  # to avoid two formatters fighting over the same files.)
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.4.8
    hooks:
      - id: ruff
        args: [--fix]

  - repo: https://github.com/psf/black
    rev: 24.4.2
    hooks:
      - id: black

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-merge-conflict
      - id: detect-private-key
