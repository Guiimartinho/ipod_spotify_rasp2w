name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      # The app modules and the test suite are stdlib-only (spotipy/redis/PIL are
      # imported lazily), so no dependency install is required to run the tests.
      - name: Byte-compile all modules
        working-directory: frontend
        run: >-
          python -m py_compile
          config.py serialization.py input_decoder.py
          datastore.py spotify_manager.py view_model.py spotifypod.py

      - name: Run unit tests
        working-directory: frontend
        run: python -m unittest discover -s tests -v
