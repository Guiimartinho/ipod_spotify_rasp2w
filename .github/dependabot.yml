version: 2
updates:
  # Python dependencies (frontend/requirements*.txt)
  - package-ecosystem: "pip"
    directory: "/frontend"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "build"      # -> "build(deps): bump spotipy from x to y"
      prefix-development: "build"
    groups:
      python-deps:
        patterns:
          - "*"

  # GitHub Actions used by the CI workflow
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "ci"         # -> "ci(deps): bump actions/checkout from 4 to 5"
    groups:
      actions:
        patterns:
          - "*"
